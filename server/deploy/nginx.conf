# Nginx reverse proxy: HTTPS -> Node backend on 127.0.0.1:3000
#
# Install:
#   sudo cp nginx.conf /etc/nginx/sites-available/badminton
#   sudo ln -s /etc/nginx/sites-available/badminton /etc/nginx/sites-enabled/badminton
# Get a free HTTPS cert (fills in the ssl_certificate paths below):
#   sudo certbot --nginx -d badminton.example.com
# Reload:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace badminton.example.com with your real domain.

server {
    listen 80;
    server_name badminton.example.com;
    # Force HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name badminton.example.com;

    # Managed by certbot --nginx:
    ssl_certificate     /etc/letsencrypt/live/badminton.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/badminton.example.com/privkey.pem;

    # Modern TLS
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Requests are tiny JSON; QR images are small.
    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
